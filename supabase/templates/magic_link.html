<!--
  Gazetteer magic-link email. Not wired into supabase/config.toml (that would
  require `supabase config push`, which has no diff/dry-run and would risk
  resetting the Google OAuth provider — configured only in the dashboard, not
  in config.toml). Paste this directly into the Supabase dashboard instead:
  Authentication → Email Templates → Magic Link.

  Kept to inline styles + a table layout on purpose: email clients don't load
  external stylesheets or Google Fonts reliably, so this can't just reuse the
  app's CSS.
-->
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#F7F5EF; padding:32px 16px;">
  <tr>
    <td align="center">
      <table role="presentation" width="100%" style="max-width:420px;" cellpadding="0" cellspacing="0">
        <tr>
          <td style="border:2px solid #1A1A18; padding:32px 28px; background-color:#F7F5EF;">
            <p style="margin:0 0 24px; font-family:Georgia, 'Times New Roman', serif; font-style:italic; font-size:28px; color:#1A1A18;">
              Gazetteer
            </p>

            <p style="margin:0 0 8px; font-family:Arial, Helvetica, sans-serif; font-size:15px; line-height:1.5; color:#1A1A18;">
              Tap below to sign in. This link works once and expires shortly.
            </p>

            <table role="presentation" cellpadding="0" cellspacing="0" style="margin:24px 0;">
              <tr>
                <td style="background-color:#C2187A;">
                  <a href="{{ .ConfirmationURL }}"
                     style="display:inline-block; padding:12px 24px; font-family:Arial, Helvetica, sans-serif; font-size:13px; font-weight:bold; letter-spacing:1px; text-transform:uppercase; color:#F7F5EF; text-decoration:none;">
                    Sign in to Gazetteer
                  </a>
                </td>
              </tr>
            </table>

            <p style="margin:0 0 4px; font-family:Arial, Helvetica, sans-serif; font-size:12px; color:#B8B2A3;">
              Or paste this link into your browser:
            </p>
            <p style="margin:0 0 24px; font-family:'Courier New', monospace; font-size:12px; color:#3B6FA0; word-break:break-all;">
              {{ .ConfirmationURL }}
            </p>

            <p style="margin:0; font-family:Arial, Helvetica, sans-serif; font-size:12px; color:#B8B2A3;">
              Didn't request this? You can ignore this email.
            </p>
          </td>
        </tr>
        <tr>
          <td style="padding:16px 4px 0; font-family:Arial, Helvetica, sans-serif; font-size:11px; letter-spacing:1px; text-transform:uppercase; color:#B8B2A3;">
            Open source. Channels for every place.
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
